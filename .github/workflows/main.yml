name: Generate Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: luafxrreira
          outputs: |
            dist/bomberman-contribution-graph.svg
            dist/bomberman-contribution-graph-dark.svg?palette=github-dark

      - name: push github-contribution-grid-snake.svg to the pacman-output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
